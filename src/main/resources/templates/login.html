<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Café Aroma & Sabor</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .login-card {
            width: 420px;
            background: #fff;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        .login-card h2 { margin-bottom: 18px; }
        .login-card form { display: grid; gap: 12px; }
        .login-card input { padding: 12px 14px; border-radius: 8px; border: 1px solid #E0D7D0; }
        .login-card button { padding: 12px; border-radius: 8px; background: linear-gradient(135deg,#D4A574 0%,#C89968 100%); color:#fff; border:none; cursor:pointer; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-inner">
        <div class="logo">☕ Café Aroma & Sabor</div>
        <div class="nav-links">
            <a th:href="@{/}">Início</a>
            <a th:href="@{/produto}">Produtos</a>
            <a th:href="@{/estoque}">Estoque</a>
            <a th:href="@{/usuario}">Usuários</a>
        </div>
        <div class="nav-user">
            <a th:href="@{/login}" class="btn btn-primary">Entrar</a>
        </div>
    </div>
</nav>

<div class="container login-page">
    <div class="login-card">
        <h2>Entrar no sistema</h2>
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" required />

            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required />

            <button type="submit">Entrar</button>
        </form>
    </div>
</div>
</body>
</html>
