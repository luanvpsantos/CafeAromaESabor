<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Café Aroma & Sabor</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <div class="logo">☕ Café Aroma & Sabor</div>
            <div class="nav-links">
                <a th:href="@{/}">Início</a>
                <a th:href="@{/produto}">Produtos</a>
                <a th:href="@{/estoque}">Estoque</a>
                <a th:href="@{/usuario}">Usuários</a>
            </div>
            <div class="nav-user">
                <span th:if="${#authorization.expression('isAuthenticated()')}" th:text="${#authentication.name}">Usuário</span>
                <form th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{/logout}" method="post" style="display:inline;margin-left:12px;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-link">Sair</button>
                </form>
                <a th:if="${!#authorization.expression('isAuthenticated()')}" th:href="@{/login}" class="btn btn-primary">Entrar</a>
            </div>
        </div>
    </nav>

    <div class="container principal-container">
        <header>
            <div>
                <h2>Bem-vindo, <span th:text="${#authentication.name}">Usuário</span></h2>
            </div>
            <div class="top-actions">
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-secondary">Sair</button>
                </form>
            </div>
        </header>
    </div>
</body>
</html>
