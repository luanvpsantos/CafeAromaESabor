<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto - Café Aroma & Sabor</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .form-section h3 {
            grid-column: 1 / -1;
            color: #2C1810;
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 18px;
            border-bottom: 2px solid #E0D7D0;
            padding-bottom: 12px;
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .form-actions button,
        .form-actions a {
            padding: 14px 28px;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-actions button {
            background: linear-gradient(135deg, var(--primary-brown) 0%, #704834 100%);
            color: #fff;
        }

        .form-actions button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(92, 64, 51, 0.3);
        }

        .form-actions a {
            background: #fff;
            color: var(--primary-brown);
            border: 2px solid var(--border-color);
            text-decoration: none;
        }

        .form-actions a:hover {
            background: var(--bg-light);
            border-color: var(--accent-gold);
        }

        form {
            display: contents;
        }

        .form-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .form-info {
            background: rgba(212, 165, 116, 0.05);
            padding: 12px 16px;
            border-radius: 8px;
            grid-column: 1 / -1;
            color: #666;
            font-size: 13px;
            border-left: 4px solid var(--accent-gold);
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-inner">
        <div class="logo">☕ Café Aroma & Sabor</div>
        <div class="nav-links">
            <a th:href="@{/}">Início</a>
            <a th:href="@{/produto}">Produtos</a>
            <a th:href="@{/estoque}">Estoque</a>
            <a th:href="@{/usuario}">Usuários</a>
        </div>
        <div class="nav-user">
            <span th:if="${#authorization.expression('isAuthenticated()')}" th:text="${#authentication.name}">Usuário</span>
            <form th:if="${#authorization.expression('isAuthenticated()')}" th:action="@{/logout}" method="post" style="display:inline;margin-left:12px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-link">Sair</button>
            </form>
            <a th:if="${!#authorization.expression('isAuthenticated()')}" th:href="@{/login}" class="btn btn-primary">Entrar</a>
        </div>
    </div>
</nav>

<div class="container">
    <header>
        <div>
            <h2>Editar Produto</h2>
            <p style="color: #666; font-size: 14px; margin-top: 4px;">Atualize as informações do produto</p>
        </div>
        <div class="top-actions">
            <a th:href="@{/produto}" class="btn btn-secondary">← Voltar</a>
        </div>
    </header>

    <section class="form-section">
        <form th:action="@{/produto}" th:object="${produto}" method="post" class="form-container">
            <input type="hidden" th:field="*{id}" />

            <div class="form-info">
                 Produto ID: <strong th:text="${produto.id}"></strong>
            </div>

            <h3>Informações Básicas</h3>

            <div style="grid-column: span 2;">
                <label>Nome do Produto *</label>
                <input type="text" th:field="*{nome}" placeholder="Ex: Café Premium Arábica" required />
            </div>

            <div style="grid-column: span 2;">
                <label>Descrição</label>
                <input type="text" th:field="*{descricao}" placeholder="Ex: Café de alta qualidade com notas de chocolate" />
            </div>

            <div>
                <label>Preço (R$)</label>
                <input type="number" step="0.01" th:field="*{preco}" placeholder="0.00" />
            </div>

            <div>
                <label>Lote</label>
                <input type="text" th:field="*{lote}" placeholder="Ex: LOTE-2024-001" />
            </div>

            <h3>Controle de Estoque</h3>

            <div>
                <label>Validade</label>
                <input type="text" th:field="*{validade}" placeholder="DD/MM/YYYY" />
            </div>

            <div>
                <label>Quantidade</label>
                <input type="number" th:field="*{quantidade}" min="0" placeholder="0" />
            </div>

            <div>
                <label>Estoque Mínimo</label>
                <input type="number" th:field="*{estoqueMinimo}" min="0" placeholder="10" />
            </div>

            <div class="form-actions">
                <button type="submit">✓ Salvar Alterações</button>
                <a th:href="@{/produto}">Cancelar</a>
            </div>
        </form>
    </section>
</div>
</body>
</html>
